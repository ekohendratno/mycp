<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - MyControlPanel</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/app.css?v=login-1">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-panel">
      <div class="brand login-brand"><span class="brand-mark"><i class="fa-solid fa-server"></i></span><div><strong>MyControlPanel</strong><small>Linux Hosting Panel</small></div></div>
      <form id="loginForm" class="login-form">
        <div><p class="eyebrow">Admin Login</p><h1>Masuk Panel</h1></div>
        <label>Username<input name="username" value="admin" required autocomplete="username"></label>
        <label>Password<input name="password" type="password" value="admin123" required autocomplete="current-password"></label>
        <button class="primary-btn login-btn" type="submit"><i class="fa-solid fa-right-to-bracket"></i><span>Login</span></button>
        <small class="login-hint">Demo: admin / admin123</small>
      </form>
    </section>
  </main>
  <script src="assets/js/login.js?v=login-1"></script>
</body>
</html>
